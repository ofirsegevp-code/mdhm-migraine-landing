<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Assistant', Arial, sans-serif; direction: rtl; }
  </style>
  <script>
    (function() {
      function notifyParent(url) {
        try { window.parent.postMessage({ type: 'navigate', url: url }, '*'); } catch(e) {}
      }
      try {
        var orig = Object.getOwnPropertyDescriptor(Location.prototype, 'href');
        Object.defineProperty(Location.prototype, 'href', {
          set: function(url) { notifyParent(url); },
          get: orig.get
        });
      } catch(e) {}
      var origAssign = window.location.assign.bind(window.location);
      window.location.assign = function(url) { notifyParent(url); };
      var origReplace = window.location.replace.bind(window.location);
      window.location.replace = function(url) { notifyParent(url); };
    })();
  </script>
</head>
