<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה — ערכת MDHM לכאבי ראש ומיגרנה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Assistant', Arial, sans-serif;
      background-color: #F9F4EE;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #E8DDD5;
      box-shadow: 0 4px 32px rgba(139,38,53,0.08);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }
    .card-header {
      background: #8B2635;
      padding: 20px 24px;
      text-align: center;
    }
    .card-header h1 {
      color: white;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-header p {
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
    }
    .steps {
      background: #F9F4EE;
      padding: 16px 24px;
      border-bottom: 1px solid #E8DDD5;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      background: #8B2635;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step span { font-size: 0.875rem; color: #1C1C1C; }
    .form-body { padding: 24px; }
    .card-footer {
      background: #F9F4EE;
      padding: 12px 24px;
      text-align: center;
      border-top: 1px solid #E8DDD5;
      font-size: 0.75rem;
      color: #5C5150;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #8B2635;
      font-size: 0.875rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>ערכת MDHM לכאבי ראש ומיגרנה</h1>
      <p>129 ₪ בלבד • גישה מיידית למייל</p>
    </div>
    <div class="steps">
      <div class="step"><div class="step-num">1</div><span>מלאי את הפרטים בטופס למטה</span></div>
      <div class="step"><div class="step-num">2</div><span>השלימי רכישה בדרך התשלום המאובטח</span></div>
      <div class="step"><div class="step-num">3</div><span>תוך 15 שניות כל הערכה מגיעה ישירות למייל שלך</span></div>
    </div>
    <div class="form-body">
      <script type='text/javascript' src='//form2.ravpage.co.il/860a8a40a584e506e5f27c6bd212e9f969E77DBB' charset='UTF-8'></script>
    </div>
    <div class="card-footer">אחריות מלאה 30 יום ✦ גישה מיידית למייל ✦ תשלום מאובטח</div>
  </div>
  <a href="/" class="back-link">← חזרה לדף</a>
</body>
</html>
